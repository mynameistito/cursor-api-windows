name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build release bundle
        run: bun run build

      - name: Zip release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          if (-not $version -or $version -eq '${{ github.ref_name }}') { $version = '0.0.0-dev' }
          Compress-Archive -Path dist/cursor-api/* -DestinationPath "dist/cursor-api-$version-win-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-api-windows
          path: dist/cursor-api-*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/cursor-api-*.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
