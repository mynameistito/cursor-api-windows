name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Version and tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
      should_build: ${{ steps.tag.outputs.should_build == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Count pending changesets
        id: pending
        run: |
          COUNT=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Version packages
        if: steps.pending.outputs.count != '0'
        run: bun run version:packages

      - name: Commit version bump
        if: steps.pending.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: version packages"
          git push origin HEAD:main

      - name: Tag release
        id: tag
        run: |
          VERSION="v$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "${VERSION}"; then
            echo "Tag ${VERSION} already exists on origin"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bun run release:tag
          git push origin --tags
          echo "should_build=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows release
    needs: release
    if: |
      always() && needs.release.result != 'failure' && (
        needs.release.outputs.should_build == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: windows-latest
    env:
      PUBLISHED: ${{ (needs.release.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch') && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || (needs.release.outputs.release_tag != '' && needs.release.outputs.release_tag || 'main') }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Resolve release tag
        id: release
        run: bun run release tag --github-output

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build release bundle
        run: bun run build

      - name: Zip release
        run: bun run release zip --tag ${{ steps.release.outputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cursor-api-windows
          path: dist/cursor-api-*-win-x64.zip

      - name: Attach to GitHub Release
        if: steps.release.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run release upload --tag ${{ steps.release.outputs.tag }}
