name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: typecheck
          - os: ubuntu-latest
            task: test
          - os: ubuntu-latest
            task: check
          - os: ubuntu-latest
            task: knip
          - os: ubuntu-latest
            task: build:web
            needs_node: true
          - os: windows-latest
            task: build:cli
            needs_node: true
    name: ${{ matrix.task }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        if: matrix.needs_node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          TURBO_TELEMETRY_DISABLED: "1"

      - name: Run task
        run: bun run ${{ matrix.task }}
        env:
          TURBO_TELEMETRY_DISABLED: "1"
